{% extends "base.html" %}
{% block title %}Withdraw{% endblock %}

{% block content %}

<section style="max-width: 620px; margin: auto;">

  <h2 class="section-title">Verify to withdraw</h2>
  <p class="section-desc">
    Make sure the code matches the one sent to your Email.
  </p>

  <form method="POST" class="card">

    <div class="form-group">
      <label>Verification Code</label>
      <input
        type="number"
        name="code"
        required
      >
    </div>


    <!-- Actions -->
    <div class="actions">
      <button type="submit">Withdraw</button>
      <a href="{{ url_for('dashboard') }}">Cancel</a>
    </div>

  </form>
</section>

<style>
  .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 22px;
  }

  .form-group label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .form-group input {
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
  }

  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-soft);
  }

  .form-group small {
    margin-top: 6px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .actions {
    display: flex;
    gap: 16px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .actions button {
    padding: 14px 28px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 600;
    cursor: pointer;
  }

  .actions button:hover {
    opacity: 0.9;
  }

  .actions a {
    padding: 14px 28px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .actions a:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  @media (max-width: 600px) {
    section {
      padding: 0 8px;
    }
  }
</style>

{% endblock %}
